<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioFlow</title>
    <link rel="stylesheet" href="styles/output.css">
</head>
<body class="bg-slate-900 px-4 py-4 space-y-4 select-none">
<div id="correctingContainer" class="rounded-md shadow-xl shadow-inner outline outline-2 outline-slate-800 bg-gradient-to-b from-slate-900 to-slate-800 px-5 py-3 space-y-2 w-full">
    <div id="correctingHeader" class="flex flex-row items-center justify-between relative">
        <button id="correctingChevron" class="expand-chevron collapsed text-slate-400 cursor-pointer">›</button>
        <div class="font-sans font-bold text-2xl text-slate-400">Correcting</div>
        <label class="flex justify-between items-center">
            <input id="correctingToggle" type="checkbox" class="appearance-none peer">
            <span class="outline outline-2 outline-offset-2 outline-slate-800 w-12 h-6 flex items-center flex-shrink-0 ml-3 p-1 bg-slate-800 rounded-full after:w-4 after:h-4 after:bg-slate-400 after:rounded-full after:shadow-md peer-checked:bg-indigo-800 duration-200 ease-in-out after:duration-200 peer-checked:after:translate-x-6 cursor-pointer"></span>
        </label>
    </div>
    <div id="correctingBody" class="" style="display: none;">
        <div class="font-sans font-normal text-sm text-slate-400 py-1">Correcting the frequency response of your audio device</div>
        <div class="flex gap-3">
            <select id="selectCorrectionIR" class="outline outline-2 outline-slate-900 w-full h-7 bg-slate-800 rounded-md font-sans font-medium text-sm text-slate-400 py-1 pl-1 cursor-pointer">
            </select>
            <button id="correctionIRButton" class="outline outline-2 outline-slate-900 h-7 px-4 bg-slate-800 rounded-md font-sans font-medium text-sm text-slate-400 cursor-pointer hover:bg-slate-700 active:bg-slate-600 whitespace-nowrap flex-shrink-0">Load IR</button>
        </div>
        <div id="correctionDW" class="relative">
            <input id="correctionDWBox" type="number" class="absolute -top-6 text-center w-10 h-5 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400 pointer-events-none z-10">
            <div class="font-sans font-medium text-base text-slate-400 py-1">Dry/Wet Mix</div>
            <input id="correctionDWSlider" type="range" step="1" min="0" max="100" value="100" class="outline outline-2 outline-slate-900 w-full h-5 rounded-md bg-transparent cursor-pointer">
        </div>
    </div>
</div>
<div id="preamplifierContainer" class="rounded-md shadow-xl shadow-inner outline outline-2 outline-slate-800 bg-gradient-to-b from-slate-900 to-slate-800 px-5 py-3 space-y-2 w-full">
    <div id="preamplifierHeader" class="flex flex-row items-center justify-between relative">
        <button id="preamplifierChevron" class="expand-chevron collapsed text-slate-400 cursor-pointer">›</button>
        <div class="font-sans font-bold text-2xl text-slate-400">Preamplifier</div>
        <label class="flex justify-between items-center">
            <input id="preamplifierToggle" type="checkbox" class="appearance-none peer">
            <span class="outline outline-2 outline-offset-2 outline-slate-800 w-12 h-6 flex items-center flex-shrink-0 ml-3 p-1 bg-slate-800 rounded-full after:w-4 after:h-4 after:bg-slate-400 after:rounded-full after:shadow-md peer-checked:bg-indigo-800 duration-200 ease-in-out after:duration-200 peer-checked:after:translate-x-6 cursor-pointer"></span>
        </label>
    </div>
    <div id="preamplifierBody" class="" style="display: none;">
    <div id="autoPreampSection" class="relative">
        <input id="preamplifierGainBox" type="number" class="absolute -top-6 text-center w-10 h-5 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400 pointer-events-none z-10">
        <div class="py-1 flex items-center justify-between">
            <div class="font-sans font-medium text-base text-slate-400">Gain</div>
            <label class="flex items-center">
                <label for="autoPreampToggle" class="font-sans font-normal text-sm text-slate-400">Auto</label>
                <input id="autoPreampToggle" type="checkbox" class="appearance-none peer">
                <span class="outline outline-slate-800 w-8 h-4 flex items-center flex-shrink-0 ml-2 p-1 bg-slate-800 rounded-full after:w-3 after:h-3 after:bg-slate-400 after:rounded-full after:shadow-md peer-checked:bg-indigo-800 duration-200 ease-in-out after:duration-200 peer-checked:after:translate-x-3 cursor-pointer"></span>
            </label>
        </div>
        <input id="preampSlider" type="range" step="1" min="-30" max="30" value="0" class="outline outline-2 outline-slate-900 w-full h-5 rounded-md bg-transparent cursor-pointer">
        <div class="flex justify-between font-sans font-medium text-xs text-slate-400">
            <label>-30 dB</label>
            <label>0 dB</label>
            <label>+30 dB</label>
        </div>
    </div>
    </div>
</div>
<div id="equalizerContainer" class="relative rounded-md shadow-xl shadow-inner outline outline-2 outline-slate-800 bg-gradient-to-b from-slate-900 to-slate-800 px-5 py-3 space-y-2 w-full">
    <div id="equalizerHeader" class="flex flex-row items-center justify-between relative">
        <button id="equalizerChevron" class="expand-chevron collapsed text-slate-400 cursor-pointer">›</button>
        <div class="font-sans font-bold text-2xl text-slate-400">Equalizer</div>
        <label class="flex justify-between items-center">
            <input id="equalizerToggle" type="checkbox" class="appearance-none peer">
            <span class="outline outline-2 outline-offset-2 outline-slate-800 w-12 h-6 flex items-center flex-shrink-0 ml-3 p-1 bg-slate-800 rounded-full after:w-4 after:h-4 after:bg-slate-400 after:rounded-full after:shadow-md peer-checked:bg-indigo-800 duration-200 ease-in-out after:duration-200 peer-checked:after:translate-x-6 cursor-pointer"></span>
        </label>
    </div>
    <div id="equalizerBody" class="" style="display: none;">
    <div id="presets" class="">
        <div class="font-sans font-medium text-base text-slate-400 py-1">Preset</div>
        <select id="selectEqualizerPreset" class="outline outline-2 outline-slate-900 w-full h-7 bg-slate-800 rounded-md font-sans font-medium text-sm text-slate-400 py-1 pl-1 cursor-pointer">
            <option value="custom">Custom</option>
        </select>
    </div>
    <div id="parameters" class="">
        <div class="font-sans font-medium text-base text-slate-400">Parameters
            <div id="sideBar" class="">
                <div id="hzLabel" class="font-sans font-medium text-xs text-slate-400 py-1">Hz</div>
                <div id="sliderLabels" class="flex flex-col font-sans font-medium text-xs text-slate-400 justify-between h-[238px]">
                    <label>+30 dB&nbsp&nbsp-</label>
                    <label>0 dB&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp-</label>
                    <label>-30 dB&nbsp&nbsp-</label>
                </div>
                <div class="py-1">
                    <div id="gainLabel" class="font-sans font-medium text-xs text-slate-400 pt-[2px]">Gain</div>
                    <div id="qLabel" class="font-sans font-medium text-xs text-slate-400 pt-[3px]">Q value</div>
                </div>
            </div>
            <div id="sliders" class="">
                <div id="eqSliderContainer0" class="eqSliderContainer">
                    <input id="fBox0" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="eqSlider0" type="range" step="1" min="-30" max="30" value="0" class="absolute outline outline-2 outline-slate-900 w-56 h-6 bg-transparent rounded-md">
                    <input id="gainBox0" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="qBox0" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                </div>
                <div id="eqSliderContainer1" class="eqSliderContainer">
                    <input id="fBox1" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="eqSlider1" type="range" step="1" min="-30" max="30" value="0" class="absolute outline outline-2 outline-slate-900 w-56 h-6 bg-transparent rounded-md">
                    <input id="gainBox1" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="qBox1" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                </div>
                <div id="eqSliderContainer2" class="eqSliderContainer">
                    <input id="fBox2" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="eqSlider2" type="range" step="1" min="-30" max="30" value="0" class="absolute outline outline-2 outline-slate-900 w-56 h-6 bg-transparent rounded-md">
                    <input id="gainBox2" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="qBox2" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                </div>
                <div id="eqSliderContainer3" class="eqSliderContainer">
                    <input id="fBox3" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="eqSlider3" type="range" step="1" min="-30" max="30" value="0" class="absolute outline outline-2 outline-slate-900 w-56 h-6 bg-transparent rounded-md">
                    <input id="gainBox3" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="qBox3" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                </div>
                <div id="eqSliderContainer4" class="eqSliderContainer">
                    <input id="fBox4" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="eqSlider4" type="range" step="1" min="-30" max="30" value="0" class="absolute outline outline-2 outline-slate-900 w-56 h-6 bg-transparent rounded-md">
                    <input id="gainBox4" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="qBox4" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                </div>
                <div id="eqSliderContainer5" class="eqSliderContainer">
                    <input id="fBox5" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="eqSlider5" type="range" step="1" min="-30" max="30" value="0" class="absolute outline outline-2 outline-slate-900 w-56 h-6 bg-transparent rounded-md">
                    <input id="gainBox5" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="qBox5" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                </div>
                <div id="eqSliderContainer6" class="eqSliderContainer">
                    <input id="fBox6" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="eqSlider6" type="range" step="1" min="-30" max="30" value="0" class="absolute outline outline-2 outline-slate-900 w-56 h-6 bg-transparent rounded-md">
                    <input id="gainBox6" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="qBox6" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                </div>
                <div id="eqSliderContainer7" class="eqSliderContainer">
                    <input id="fBox7" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="eqSlider7" type="range" step="1" min="-30" max="30" value="0" class="absolute outline outline-2 outline-slate-900 w-56 h-6 bg-transparent rounded-md">
                    <input id="gainBox7" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="qBox7" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                </div>
                <div id="eqSliderContainer8" class="eqSliderContainer">
                    <input id="fBox8" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="eqSlider8" type="range" step="1" min="-30" max="30" value="0" class="absolute outline outline-2 outline-slate-900 w-56 h-6 bg-transparent rounded-md">
                    <input id="gainBox8" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="qBox8" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                </div>
                <div id="eqSliderContainer9" class="eqSliderContainer">
                    <input id="fBox9" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="eqSlider9" type="range" step="1" min="-30" max="30" value="0" class="absolute outline outline-2 outline-slate-900 w-56 h-6 bg-transparent rounded-md">
                    <input id="gainBox9" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                    <input id="qBox9" type="number" class="absolute text-center w-10 h-4 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400">
                </div>
            </div>
        </div>
    </div>
    </div>
</div>
<div id="reverbContainer" class="rounded-md shadow-xl shadow-inner outline outline-2 outline-slate-800 bg-gradient-to-b from-slate-900 to-slate-800 px-5 py-3 space-y-2 w-full">
    <div id="reverbHeader" class="flex flex-row items-center justify-between relative">
        <button id="reverbChevron" class="expand-chevron collapsed text-slate-400 cursor-pointer">›</button>
        <div class="font-sans font-bold text-2xl text-slate-400">Convolver</div>
        <label class="flex justify-between items-center">
            <input id="reverbToggle" type="checkbox" class="appearance-none peer">
            <span class="outline outline-2 outline-offset-2 outline-slate-800 w-12 h-6 flex items-center flex-shrink-0 ml-3 p-1 bg-slate-800 rounded-full after:w-4 after:h-4 after:bg-slate-400 after:rounded-full after:shadow-md peer-checked:bg-indigo-800 duration-200 ease-in-out after:duration-200 peer-checked:after:translate-x-6 cursor-pointer"></span>
        </label>
    </div>
    <div id="reverbBody" class="" style="display: none;">
    <div id="spaces" class="">
        <div class="font-sans font-medium text-base text-slate-400 py-1">Space</div>
        <div class="flex gap-3">
            <select id="selectReverbPreset" class="outline outline-2 outline-slate-900 w-full h-7 bg-slate-800 rounded-md font-sans font-medium text-sm text-slate-400 py-1 pl-1 cursor-pointer">
            </select>
            <button id="customIRButton" class="outline outline-2 outline-slate-900 h-7 px-4 bg-slate-800 rounded-md font-sans font-medium text-sm text-slate-400 cursor-pointer hover:bg-slate-700 active:bg-slate-600 whitespace-nowrap">Custom</button>
        </div>
    </div>
    <div id="reverb" class="relative">
        <input id="drywetBox" type="number" class="absolute -top-6 text-center w-10 h-5 bg-slate-900 rounded-sm font-sans font-medium text-xs text-slate-400 pointer-events-none z-10">
        <div class="font-sans font-medium text-base text-slate-400 py-1">Dry/Wet Mix</div>
        <input id="drywetSlider" type="range" step="1" min="0" max="100" value="50" class="outline outline-2 outline-slate-900 w-full h-5 rounded-md bg-transparent cursor-pointer">
    </div>
    </div>
</div>
<div id="settingsContainer" class="rounded-md shadow-xl shadow-inner outline outline-2 outline-slate-800 bg-gradient-to-b from-slate-900 to-slate-800 px-5 py-3 space-y-2 w-full">
    <div id="settingsHeader" class="flex flex-row items-center justify-between relative">
        <button id="settingsChevron" class="expand-chevron collapsed text-slate-400 cursor-pointer">›</button>
        <div class="font-sans font-bold text-2xl text-slate-400">Settings</div>
        <div class="w-12"></div>
    </div>
    <div id="settingsBody" class="" style="display: none;">
    <div id="outputDevice" class="">
        <div class="font-sans font-medium text-base text-slate-400 py-1">Output device</div>
        <select id="selectOutputDevice" class="outline outline-2 outline-slate-900 w-full h-7 bg-slate-800 rounded-md font-sans font-medium text-sm text-slate-400 py-1 pl-1 cursor-pointer">
        </select>
    </div>
    <div id="bufferSizeSection" class="pt-2">
        <div class="font-sans font-medium text-base text-slate-400 py-1">Buffer size</div>
        <select id="selectBufferSize" class="outline outline-2 outline-slate-900 w-full h-7 bg-slate-800 rounded-md font-sans font-medium text-sm text-slate-400 py-1 pl-1 cursor-pointer">
            <option value="256">256</option>
            <option value="512">512</option>
            <option value="1024">1024</option>
            <option value="2048">2048</option>
            <option value="4096">4096</option>
            <option value="8192">8192</option>
            <option value="16384">16384</option>
        </select>
    </div>
    </div>
</div>
<script src="./renderer.js"></script>
</body>
</html>
